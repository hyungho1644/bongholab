<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📷 Camera → PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #ff6b35;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #00ff88;
    --danger: #ff4060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,229,255,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: ambientShift 8s ease-in-out infinite alternate;
  }

  @keyframes ambientShift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(2%, 2%); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 50px;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, rgba(0,229,255,0.1), rgba(124,58,237,0.1));
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 100px;
    padding: 8px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  /* Main layout */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 640px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* Camera panel */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .panel-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .status-dot.active {
    background: var(--success);
    box-shadow: 0 0 10px var(--success);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .camera-wrap {
    position: relative;
    aspect-ratio: 4/3;
    background: #050508;
    overflow: hidden;
  }

  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .camera-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Corner brackets */
  .camera-overlay::before,
  .camera-overlay::after {
    content: '';
    position: absolute;
    width: 30px;
    height: 30px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.7;
  }
  .camera-overlay::before {
    top: 16px; left: 16px;
    border-width: 2px 0 0 2px;
  }
  .camera-overlay::after {
    bottom: 16px; right: 16px;
    border-width: 0 2px 2px 0;
  }

  .corner-br {
    position: absolute;
    top: 16px; right: 16px;
    width: 30px; height: 30px;
    border-top: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
    opacity: 0.7;
  }
  .corner-tl {
    position: absolute;
    bottom: 16px; left: 16px;
    width: 30px; height: 30px;
    border-bottom: 2px solid var(--accent);
    border-left: 2px solid var(--accent);
    opacity: 0.7;
  }

  /* Center crosshair */
  .crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
    opacity: 0.4;
  }
  .crosshair::before,
  .crosshair::after {
    content: '';
    position: absolute;
    background: var(--accent);
  }
  .crosshair::before {
    width: 100%; height: 1px;
    top: 50%; left: 0;
  }
  .crosshair::after {
    height: 100%; width: 1px;
    left: 50%; top: 0;
  }

  /* Camera placeholder */
  .cam-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  .cam-icon {
    font-size: 48px;
    opacity: 0.3;
    filter: grayscale(1);
  }

  .cam-placeholder p {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
  }

  /* Preview panel */
  .preview-wrap {
    position: relative;
    aspect-ratio: 4/3;
    background: #050508;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #previewCanvas {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
  }

  .preview-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 1px;
  }

  .preview-placeholder .icon {
    font-size: 40px;
    opacity: 0.2;
  }

  /* Capture flash */
  .flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.05s;
  }
  .flash.active { opacity: 1; }

  /* Controls */
  .controls {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 24px;
    border-radius: 12px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    letter-spacing: 0.5px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0088cc);
    color: #000;
    box-shadow: 0 0 30px rgba(0,229,255,0.3);
  }
  .btn-primary:hover {
    box-shadow: 0 0 50px rgba(0,229,255,0.5);
    transform: translateY(-1px);
  }

  .btn-capture {
    background: linear-gradient(135deg, #ff6b35, #ff4060);
    color: #fff;
    font-size: 17px;
    padding: 18px 24px;
    box-shadow: 0 0 30px rgba(255,107,53,0.3);
  }
  .btn-capture:hover {
    box-shadow: 0 0 50px rgba(255,107,53,0.5);
    transform: translateY(-1px);
  }
  .btn-capture:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  .btn-pdf {
    background: linear-gradient(135deg, var(--accent2), #5b21b6);
    color: #fff;
    box-shadow: 0 0 30px rgba(124,58,237,0.3);
  }
  .btn-pdf:hover {
    box-shadow: 0 0 50px rgba(124,58,237,0.5);
    transform: translateY(-1px);
  }
  .btn-pdf:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* Options */
  .options-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .option-chip {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .option-chip:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .option-chip.selected {
    border-color: var(--accent2);
    background: rgba(124,58,237,0.15);
    color: #c4b5fd;
  }

  /* Captured list */
  .captured-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .captured-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.02);
  }

  .captured-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .count-badge {
    background: rgba(124,58,237,0.2);
    border: 1px solid rgba(124,58,237,0.4);
    color: #c4b5fd;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 1px;
  }

  .thumbnails {
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .thumb-item {
    flex-shrink: 0;
    position: relative;
    width: 100px;
    aspect-ratio: 4/3;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    margin-right: 10px;
  }

  .thumb-item:hover {
    border-color: var(--accent);
    transform: scale(1.05);
  }

  .thumb-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .thumb-num {
    position: absolute;
    bottom: 4px;
    right: 4px;
    background: rgba(0,0,0,0.7);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .thumb-delete {
    position: absolute;
    top: 4px;
    right: 4px;
    background: rgba(255,64,96,0.8);
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    color: white;
    font-size: 11px;
  }

  .thumb-item:hover .thumb-delete {
    opacity: 1;
  }

  .empty-thumbs {
    width: 100%;
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* Export panel */
  .export-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: center;
  }

  @media (max-width: 640px) {
    .export-panel { grid-template-columns: 1fr; }
  }

  .export-info h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .export-info p {
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    line-height: 1.6;
  }

  .export-info .highlight {
    color: var(--accent2);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--success);
    color: var(--success);
    padding: 12px 24px;
    border-radius: 100px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 30px rgba(0,255,136,0.2);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error {
    border-color: var(--danger);
    color: var(--danger);
    box-shadow: 0 0 30px rgba(255,64,96,0.2);
  }

  /* Camera switch button */
  .cam-switch {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 5;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }
  .cam-switch:hover {
    background: rgba(0,229,255,0.2);
    border-color: var(--accent);
  }

  /* Loading spinner for capture button */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  /* File input */
  #fileInput { display: none; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  canvas#hiddenCanvas { display: none; }
</style>
</head>
<body>

<canvas id="hiddenCanvas"></canvas>

<div class="container">
  <header>
    <div class="logo-badge">📷 SNAP · TO · PDF</div>
    <h1>Camera → PDF</h1>
    <p class="subtitle">사진을 찍으면 즉시 PDF로 변환 · 여러 장을 묶어서 저장</p>
  </header>

  <div class="main-grid">
    <!-- Camera Panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📹 카메라 뷰</span>
        <div class="status-dot" id="statusDot"></div>
      </div>
      <div class="camera-wrap">
        <video id="videoEl" autoplay playsinline muted></video>
        <div class="camera-overlay">
          <div class="corner-br"></div>
          <div class="corner-tl"></div>
          <div class="crosshair"></div>
        </div>
        <div class="flash" id="flashEl"></div>
        <button class="cam-switch" id="switchCamBtn" style="display:none" title="카메라 전환">🔄</button>
        <div class="cam-placeholder" id="camPlaceholder">
          <div class="cam-icon">📷</div>
          <p>카메라를 시작해주세요</p>
        </div>
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="startCamBtn">📷 카메라 시작</button>
        <div class="divider"></div>
        <button class="btn btn-capture" id="captureBtn" disabled>● 촬영하기</button>
        <label class="btn btn-secondary" style="cursor:pointer">
          🖼 이미지 파일 불러오기
          <input type="file" id="fileInput" accept="image/*" multiple>
        </label>
      </div>
    </div>

    <!-- Preview Panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🖼 미리보기</span>
        <span id="previewInfo" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">-</span>
      </div>
      <div class="preview-wrap">
        <canvas id="previewCanvas"></canvas>
        <div class="preview-placeholder" id="previewPlaceholder">
          <div class="icon">🗂</div>
          <span>촬영 후 미리보기</span>
        </div>
      </div>
      <div class="controls">
        <!-- Page size options -->
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:4px">PDF 크기 선택</div>
        <div class="options-row">
          <div class="option-chip selected" data-size="a4">A4</div>
          <div class="option-chip" data-size="letter">Letter</div>
          <div class="option-chip" data-size="a5">A5</div>
          <div class="option-chip" data-size="square">정사각형</div>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;margin-top:4px">방향</div>
        <div class="options-row">
          <div class="option-chip selected" data-orient="portrait">세로 ↕</div>
          <div class="option-chip" data-orient="landscape">가로 ↔</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Captured Thumbnails -->
  <div class="captured-section" style="margin-bottom:20px">
    <div class="captured-header">
      <span class="captured-title">🗃 촬영된 사진</span>
      <span class="count-badge" id="countBadge">0장</span>
    </div>
    <div class="thumbnails" id="thumbnailsContainer">
      <div class="empty-thumbs" id="emptyMsg">아직 촬영된 사진이 없습니다</div>
    </div>
  </div>

  <!-- Export Panel -->
  <div class="export-panel">
    <div class="export-info">
      <h3>PDF 내보내기</h3>
      <p>
        <span class="highlight" id="imgCountLabel">0장</span>의 사진을<br>
        <span class="highlight" id="pdfSizeLabel">A4 세로</span> PDF로 변환합니다.
      </p>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-pdf" id="exportBtn" disabled>⬇ PDF 다운로드</button>
      <button class="btn btn-secondary" id="clearAllBtn">🗑 전체 삭제</button>
    </div>
  </div>

</div>

<div class="toast" id="toast">✓ 완료!</div>

<script>
  const { jsPDF } = window.jspdf;

  let stream = null;
  let facingMode = 'environment'; // back camera first
  let capturedImages = []; // base64 data URLs
  let selectedSize = 'a4';
  let selectedOrient = 'portrait';

  const videoEl = document.getElementById('videoEl');
  const hiddenCanvas = document.getElementById('hiddenCanvas');
  const previewCanvas = document.getElementById('previewCanvas');
  const previewPlaceholder = document.getElementById('previewPlaceholder');
  const previewInfo = document.getElementById('previewInfo');
  const flashEl = document.getElementById('flashEl');
  const camPlaceholder = document.getElementById('camPlaceholder');
  const statusDot = document.getElementById('statusDot');
  const switchCamBtn = document.getElementById('switchCamBtn');

  const startCamBtn = document.getElementById('startCamBtn');
  const captureBtn = document.getElementById('captureBtn');
  const exportBtn = document.getElementById('exportBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const fileInput = document.getElementById('fileInput');

  const thumbnailsContainer = document.getElementById('thumbnailsContainer');
  const emptyMsg = document.getElementById('emptyMsg');
  const countBadge = document.getElementById('countBadge');
  const imgCountLabel = document.getElementById('imgCountLabel');
  const pdfSizeLabel = document.getElementById('pdfSizeLabel');

  // --- Camera ---
  async function startCamera() {
    try {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }
      });
      videoEl.srcObject = stream;
      videoEl.style.display = 'block';
      camPlaceholder.style.display = 'none';
      statusDot.classList.add('active');
      captureBtn.disabled = false;
      startCamBtn.textContent = '🔴 카메라 중지';
      startCamBtn.onclick = stopCamera;
      // Show switch button if multiple cameras
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === 'videoinput');
      if (cams.length > 1) switchCamBtn.style.display = 'flex';
    } catch (e) {
      showToast('카메라 접근 권한이 필요합니다.', true);
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    videoEl.style.display = 'none';
    camPlaceholder.style.display = 'flex';
    statusDot.classList.remove('active');
    captureBtn.disabled = true;
    switchCamBtn.style.display = 'none';
    startCamBtn.textContent = '📷 카메라 시작';
    startCamBtn.onclick = startCamera;
  }

  startCamBtn.addEventListener('click', startCamera);

  switchCamBtn.addEventListener('click', async () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    await startCamera();
  });

  // --- Capture ---
  captureBtn.addEventListener('click', () => {
    if (!stream) return;
    // Flash effect
    flashEl.classList.add('active');
    setTimeout(() => flashEl.classList.remove('active'), 150);

    // Capture frame
    const vw = videoEl.videoWidth;
    const vh = videoEl.videoHeight;
    hiddenCanvas.width = vw;
    hiddenCanvas.height = vh;
    const ctx = hiddenCanvas.getContext('2d');
    ctx.drawImage(videoEl, 0, 0, vw, vh);
    const dataUrl = hiddenCanvas.toDataURL('image/jpeg', 0.92);

    addImage(dataUrl, vw, vh);
    showToast('📸 촬영 완료!');
  });

  // --- File input ---
  fileInput.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    for (const file of files) {
      const dataUrl = await fileToDataURL(file);
      const img = await loadImage(dataUrl);
      addImage(dataUrl, img.naturalWidth, img.naturalHeight);
    }
    fileInput.value = '';
    if (files.length > 0) showToast(`🖼 ${files.length}장 불러오기 완료!`);
  });

  function fileToDataURL(file) {
    return new Promise((res) => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  function loadImage(src) {
    return new Promise((res) => {
      const img = new Image();
      img.onload = () => res(img);
      img.src = src;
    });
  }

  // --- Add image ---
  function addImage(dataUrl, w, h) {
    capturedImages.push({ dataUrl, w, h });
    updatePreview(dataUrl, w, h);
    renderThumbnails();
    updateUI();
  }

  function updatePreview(dataUrl, w, h) {
    previewPlaceholder.style.display = 'none';
    previewCanvas.style.display = 'block';

    const maxW = previewCanvas.parentElement.clientWidth;
    const maxH = previewCanvas.parentElement.clientHeight;
    const ratio = Math.min(maxW / w, maxH / h);

    previewCanvas.width = w * ratio;
    previewCanvas.height = h * ratio;
    previewCanvas.style.width = previewCanvas.width + 'px';
    previewCanvas.style.height = previewCanvas.height + 'px';

    const ctx = previewCanvas.getContext('2d');
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0, previewCanvas.width, previewCanvas.height);
    img.src = dataUrl;

    previewInfo.textContent = `${w}×${h}`;
  }

  // --- Thumbnails ---
  function renderThumbnails() {
    thumbnailsContainer.innerHTML = '';
    if (capturedImages.length === 0) {
      thumbnailsContainer.appendChild(emptyMsg);
      return;
    }
    capturedImages.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'thumb-item';
      div.innerHTML = `
        <img src="${item.dataUrl}" alt="photo ${idx+1}">
        <span class="thumb-num">${idx+1}</span>
        <button class="thumb-delete" data-idx="${idx}" title="삭제">✕</button>
      `;
      div.querySelector('.thumb-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        capturedImages.splice(idx, 1);
        renderThumbnails();
        updateUI();
        if (capturedImages.length > 0) {
          const last = capturedImages[capturedImages.length - 1];
          updatePreview(last.dataUrl, last.w, last.h);
        } else {
          previewCanvas.style.display = 'none';
          previewPlaceholder.style.display = 'flex';
          previewInfo.textContent = '-';
        }
      });
      div.addEventListener('click', () => updatePreview(item.dataUrl, item.w, item.h));
      thumbnailsContainer.appendChild(div);
    });
  }

  function updateUI() {
    const n = capturedImages.length;
    countBadge.textContent = `${n}장`;
    imgCountLabel.textContent = `${n}장`;
    exportBtn.disabled = n === 0;
    updateSizeLabel();
  }

  // --- Size/Orientation options ---
  document.querySelectorAll('[data-size]').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('[data-size]').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      selectedSize = el.dataset.size;
      updateSizeLabel();
    });
  });

  document.querySelectorAll('[data-orient]').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('[data-orient]').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      selectedOrient = el.dataset.orient;
      updateSizeLabel();
    });
  });

  function updateSizeLabel() {
    const sizeNames = { a4: 'A4', letter: 'Letter', a5: 'A5', square: '정사각형' };
    const orientNames = { portrait: '세로', landscape: '가로' };
    pdfSizeLabel.textContent = `${sizeNames[selectedSize]} ${orientNames[selectedOrient]}`;
  }

  // --- PDF Export ---
  exportBtn.addEventListener('click', async () => {
    if (capturedImages.length === 0) return;

    exportBtn.disabled = true;
    exportBtn.innerHTML = '<span class="spinner"></span> PDF 생성 중...';

    const sizeMap = {
      a4: 'a4',
      letter: 'letter',
      a5: 'a5',
      square: [210, 210]
    };

    const orient = selectedOrient === 'portrait' ? 'p' : 'l';
    const fmt = sizeMap[selectedSize];

    const pdf = new jsPDF({ orientation: orient, unit: 'mm', format: fmt });

    for (let i = 0; i < capturedImages.length; i++) {
      if (i > 0) pdf.addPage(fmt, orient);

      const { dataUrl, w: imgW, h: imgH } = capturedImages[i];

      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();

      // Fit image to page preserving aspect ratio
      const ratio = Math.min(pageW / imgW, pageH / imgH);
      const drawW = imgW * ratio;
      const drawH = imgH * ratio;
      const x = (pageW - drawW) / 2;
      const y = (pageH - drawH) / 2;

      pdf.addImage(dataUrl, 'JPEG', x, y, drawW, drawH);
    }

    // Generate filename with timestamp
    const now = new Date();
    const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
    pdf.save(`photos_${ts}.pdf`);

    exportBtn.disabled = false;
    exportBtn.innerHTML = '⬇ PDF 다운로드';
    showToast(`✅ ${capturedImages.length}장 → PDF 저장 완료!`);
  });

  // --- Clear all ---
  clearAllBtn.addEventListener('click', () => {
    if (capturedImages.length === 0) return;
    capturedImages = [];
    renderThumbnails();
    updateUI();
    previewCanvas.style.display = 'none';
    previewPlaceholder.style.display = 'flex';
    previewInfo.textContent = '-';
    showToast('🗑 전체 삭제 완료');
  });

  // --- Toast ---
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.remove('show', 'error');
    if (isError) toast.classList.add('error');
    void toast.offsetWidth;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // Init
  updateUI();
</script>
</body>
</html>
