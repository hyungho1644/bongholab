<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 뽀모도로 타이머 | 빗소리, 백색소음으로 완벽한 몰입</title>
    <meta name="description" content="설치가 필요 없는 무료 뽀모도로 타이머입니다. 다크모드, 감성 카페, 빗소리 등 맞춤형 백색소음으로 당신의 집중력을 200% 끌어올려보세요.">
    <meta name="keywords" content="뽀모도로, 타이머, 집중력, 백색소음, 빗소리, 스터디 타이머, pomodoro timer">
    <meta property="og:title" content="프리미엄 뽀모도로 타이머">
    <meta property="og:description" content="빗소리, 백색소음으로 완벽한 몰입의 경험을 하세요. 무료 무설치 타이머.">
    <meta property="og:type" content="website">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body data-theme="dark">
    <!-- 글로벌 내비게이션 바 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">Bongho<span>Lab</span></a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">홈</a></li>
                <li><a href="timer.html" class="active">유틸리티 툴</a></li>
                <li><a href="#">IT 뉴스</a></li>
                <li><a href="#">블로그</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <header>
            <h1>Focus Timer</h1>
            <div class="controls-top" style="justify-content: center; gap: 10px; flex-wrap: wrap;">
                <select id="theme-selector" title="디자인 테마 선택" style="max-width: 200px;">
                    <option value="dark">🌙 다크 앤 시크</option>
                    <option value="light">☀️ 라이트 앤 클린</option>
                    <option value="cafe">☕ 우드 앤 카페</option>
                    <option value="forest">🌲 포레스트 힐링</option>
                </select>
                <button id="settings-btn" class="secondary-btn" style="padding: 10px 20px; font-size: 0.9rem; flex: none;">⚙️ 시간 설정</button>
            </div>
        </header>

        <main class="timer-card">
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="work">집중 +5분</button>
                <button class="mode-btn" data-mode="break">휴식 +5분</button>
            </div>
            <div class="timer-display">
                <span id="minutes">10</span><span class="colon">:</span><span id="seconds">00</span>
            </div>
            <div class="controls-bottom">
                <button id="reset-btn" class="primary-btn">초기화</button>
                <button id="repeat-btn" class="primary-btn">자동반복: OFF</button>
                <button id="start-btn" class="primary-btn">시작</button>
            </div>
        </main>
        
        <footer>
            <p>Made with ❤️ by Bong | <a href="privacy.html" class="privacy-link">개인정보처리방침</a></p>
        </footer>
    </div>
    
    <!-- Audio Elements for Background Sounds -->
    <!-- 효과음 오디오 엘리먼트 (차분한 사운드) -->
    <audio id="start-sound" src="https://actions.google.com/sounds/v1/water/water_drop.ogg" preload="auto"></audio>
    <audio id="end-sound" src="https://upload.wikimedia.org/wikipedia/commons/2/23/Tibetan_bowl.ogg" preload="auto"></audio>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-card">
            <h2>타이머 시간 설정</h2>
            <div class="setting-group">
                <label for="work-time-input">집중 시간 (분)</label>
                <input type="number" id="work-time-input" min="1" max="120" value="10">
            </div>
            <div class="setting-group">
                <label for="break-time-input">휴식 시간 (분)</label>
                <input type="number" id="break-time-input" min="1" max="30" value="5">
            </div>
            <div class="modal-actions">
                <button id="save-settings-btn" class="primary-btn">저장</button>
                <button id="close-settings-btn" class="secondary-btn">취소</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
